\section*{摘\quad 要}
威尔第歌剧《弄臣》中的咏叹调《女人善变》是歌剧史上兼具旋律美感与戏剧深度的经典作品。既往研究多将其作为独立炫技唱段进行演唱技术赏析，或仅将其视为曼图亚公爵的人物性格标签，普遍存在音乐本体分析与戏剧叙事研究割裂的问题，未能充分揭示作品音乐语言与戏剧张力的深层关联。

本研究以歌剧第三幕旅店场景为核心戏剧情境基础，采用文本分析法、音乐本体分析法与比较研究法，系统阐释威尔第如何通过曲式结构、旋律节奏、和声语汇及人声与乐队的互动关系构建戏剧张力，并重点探讨演唱者如何通过声乐技术、文本处理与舞台表演，将作品内在的戏剧张力转化为外化的戏剧行动。

研究发现，《女人善变》并非单纯的抒情炫技段落，而是兼具人物性格定型、悲剧情节推动与反讽叙事构建三重核心功能的戏剧枢纽；威尔第的每一处音乐语言设计，都精准服务于戏剧内涵的表达；而该作品演唱诠释的核心，在于实现音乐形式、戏剧逻辑与表演技术的三者统一。本研究可为该作品的演唱实践与声乐教学提供系统的理论参考与可落地的实践路径。

\vspace{1em}
\noindent\textbf{关键词：}威尔第；《弄臣》；《女人善变》；戏剧张力；演唱诠释

